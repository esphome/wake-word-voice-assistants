name: Build minimal

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    with:
      files: |
        m5stack-atom-echo/m5stack-atom-echo.minimal.factory.yaml
      esphome-version: 2026.3.2
      release-summary: ${{ github.event_name == 'release' && github.event.release.body || '' }}
      release-url: ${{ github.event_name == 'release' && github.event.release.html_url || '' }}
      release-version: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  upload-to-release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs:
      - build-firmware
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: files

      - name: Copy file to output
        run: |-
          mkdir output
          version="${{ github.event.release.tag_name }}"
          cd "files/$version"
          cp m5stack-atom-echo-esp32.factory.bin ../../output/m5stack-atom-echo.minimal.factory.bin
          md5sum m5stack-atom-echo-esp32.factory.bin | head -c 32 > ../../output/m5stack-atom-echo.minimal.factory.bin.md5

      - name: Upload files to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: output/*
          tag_name: ${{ github.event.release.tag_name }}
