name: Build

on:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-firmware:
    name: Build Firmware
    uses: ./.github/workflows/build-firmware.yml
    with:
      files: |
        esp32-s3-box/esp32-s3-box.factory.yaml
        esp32-s3-box-lite/esp32-s3-box-lite.factory.yaml
        esp32-s3-box-3/esp32-s3-box-3.factory.yaml
        m5stack-atom-echo/m5stack-atom-echo.factory.yaml
      esphome-version: 2026.2.4
      release-summary: ${{ github.event_name == 'release' && github.event.release.body || '' }}
      release-url: ${{ github.event_name == 'release' && github.event.release.html_url || '' }}
      release-version: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  build-minimal-firmware:
    name: Build Atom Echo Minimal Firmware
    uses: ./.github/workflows/build-firmware.yml
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    with:
      files: |
        m5stack-atom-echo/m5stack-atom-echo.minimal.factory.yaml
      combined-name: m5stack-atom-echo-minimal
      esphome-version: 2026.2.4
      release-summary: ${{ github.event_name == 'release' && github.event.release.body || '' }}
      release-url: ${{ github.event_name == 'release' && github.event.release.html_url || '' }}
      release-version: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  upload-to-release:
    name: Upload to Release
    if: github.event_name == 'release'
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.8.1
    needs:
      - build-firmware
    with:
      version: ${{ github.event.release.tag_name }}

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'release' && github.event.release.prerelease == false
    needs:
      - build-firmware
      - upload-to-release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: files

      - name: Create Pages content
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p pages
          version="${{ github.event.release.tag_name }}"
          repo="${{ github.repository }}"
          base_url="https://github.com/${repo}/releases/download/${version}"
          device_dirs=(files/*/"$version"/)

          if [ ${#device_dirs[@]} -eq 0 ]; then
            echo "No device artifact directories found under files/*/${version}/"
            exit 1
          fi

          for version_dir in "${device_dirs[@]}"; do
            device_dir=$(dirname "$version_dir")
            device_raw=$(basename "$device_dir")
            device="${device_raw%.factory}"
            manifest="$version_dir/manifest.json"

            if [ ! -f "$manifest" ]; then
              echo "No manifest.json found for device directory: ${device_raw}"
              exit 1
            fi

            mkdir -p "pages/${device}"
            if jq --exit-status --arg base "$base_url" '
              .builds |= map(
                (.parts |= map(.path = ($base + "/" + (.path | ltrimstr("./")))))
                | if has("ota") then .ota.path = ($base + "/" + (.ota.path | ltrimstr("./"))) else . end
              )
            ' "$manifest" > "pages/${device}/manifest.json"; then
              echo "Processed manifest for ${device_raw} -> pages/${device}"
            else
              echo "Failed to process manifest for ${device_raw} -> pages/${device}"
              rm -f "pages/${device}/manifest.json"
              exit 1
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
