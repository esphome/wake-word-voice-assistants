name: Build

on:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-firmware:
    name: Build Firmware
    uses: ./.github/workflows/build-firmware.yml
    with:
      files: |
        esp32-s3-box/esp32-s3-box.factory.yaml
        esp32-s3-box-lite/esp32-s3-box-lite.factory.yaml
        esp32-s3-box-3/esp32-s3-box-3.factory.yaml
        m5stack-atom-echo/m5stack-atom-echo.factory.yaml
      esphome-version: 2026.2.4
      release-summary: ${{ github.event_name == 'release' && github.event.release.body || '' }}
      release-url: ${{ github.event_name == 'release' && github.event.release.html_url || '' }}
      release-version: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  build-minimal-firmware:
    name: Build Atom Echo Minimal Firmware
    uses: ./.github/workflows/build-firmware.yml
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    with:
      files: |
        m5stack-atom-echo/m5stack-atom-echo.minimal.factory.yaml
      combined-name: m5stack-atom-echo-minimal
      esphome-version: 2026.2.4
      release-summary: ${{ github.event_name == 'release' && github.event.release.body || '' }}
      release-url: ${{ github.event_name == 'release' && github.event.release.html_url || '' }}
      release-version: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  upload-to-release:
    name: Upload to Release
    if: github.event_name == 'release'
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.8.1
    needs:
      - build-firmware
    with:
      version: ${{ github.event.release.tag_name }}

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'release'
    needs:
      - build-firmware
      - upload-to-release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          path: files

      - name: Create Pages content
        run: |
          mkdir -p pages
          version="${{ github.event.release.tag_name }}"
          repo="${{ github.repository }}"
          base_url="https://github.com/${repo}/releases/download/${version}"

          for device_dir in files/*/; do
            device=$(basename "$device_dir")
            manifest=$(find "$device_dir" -name "manifest.json" | head -1)
            if [ -n "$manifest" ]; then
              # Strip trailing ".factory" suffix if present; otherwise use name as-is
              clean_name="${device%.factory}"
              mkdir -p "pages/${clean_name}"
              if jq --exit-status --arg base "$base_url" \
                '.builds = [.builds[] | .parts = [.parts[] | .path = ($base + "/" + (.path | ltrimstr("./")))]]' \
                "$manifest" > "pages/${clean_name}/manifest.json"; then
                echo "Processed manifest for ${clean_name}"
              else
                echo "Warning: Failed to process manifest for ${device} — unexpected manifest structure"
                rm -f "pages/${clean_name}/manifest.json"
              fi
            else
              echo "Warning: No manifest.json found for device directory: ${device}"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
