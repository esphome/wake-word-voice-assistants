            x: 20
            y: 20
            width: 280
            height: 30
            bg_color: 0xFFFFFF
            bg_opa: COVER
            border_width: 1
            border_color: 0x000000
            radius: 4
            pad_left: 10
            pad_right: 10
            pad_top: 5
            pad_bottom: 5
            widgets:
              - label:
                  id: thinking_request_label
                  width: 260
                  text_color: 0x000000
                  text_font: font_request
                  long_mode: SCROLL_CIRCULAR
                  text: "..."
        - spinner:
            x: 140
            y: 100
            width: 40
            height: 40
            spin_time: 1s
            arc_length: 60
            arc_width: 4
            arc_color: 0xCCCCCC
            indicator:
              arc_color: 0x333333
