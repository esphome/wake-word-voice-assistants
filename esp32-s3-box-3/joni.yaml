  friendly_name: Joni
  loading_illustration_file: https://github.com/Joni-Lover/wake-word-voice-assistants/raw/main/casita/loading_320_240.png
  idle_illustration_file: https://github.com/Joni-Lover/wake-word-voice-assistants/raw/main/casita/idle_320_240.png
  listening_illustration_file: https://github.com/Joni-Lover/wake-word-voice-assistants/raw/main/casita/listening_320_240.png
