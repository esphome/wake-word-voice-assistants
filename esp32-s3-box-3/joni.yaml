sensor:
  - platform: aht10
    variant: AHT20
    i2c_id: bus_b
    temperature:
      name: Temperature
    humidity:
      name: Humidity
    update_interval: 60s
  - platform: adc
    pin: GPIO10
    id: battery_voltage
    name: Battery Voltage
    update_interval: 60s
    attenuation: auto
    filters:
      - multiply: 4.11
  - platform: copy
    source_id: battery_voltage
    name: Battery Level
    unit_of_measurement: "%"
    device_class: battery
    filters:
      - lambda: return clamp((x - 2.7f) / (4.2f - 2.7f) * 100.0f, 0.0f, 100.0f);

remote_receiver:
  id: ir_receiver
  pin:
    number: GPIO38
    inverted: true
    mode: INPUT_PULLDOWN
  tolerance: 55%
  buffer_size: 2kb

remote_transmitter:
  id: ir_transmitter
  pin: GPIO39
  carrier_duty_percent: 50%

touchscreen:
  - platform: gt911
    id: box_touchscreen
    i2c_id: bus_a
    address: 0x5D
    interrupt_pin: GPIO3
    on_touch:
      - lambda: |-
          // Home button area (bottom center, ~60x40px)
          if (touch.x >= 130 && touch.x <= 190 && touch.y >= 200 && touch.y <= 240) {
            id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
            id(draw_display).execute();
          }

spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - s3_box_lcd
  buffer_size: 12%
  default_font: font_response
  disp_bg_color: 0x000000
  top_layer:
    widgets:
      - bar:
          id: timer_bar_active
          x: 0
          y: 225
          width: 320
          height: 15
          min_value: 0
          max_value: 100
          value: 0
          radius: 0
          bg_color: 0xFFFFFF
          bg_opa: COVER
          indicator:
            bg_color: 0x26ed3a
            radius: 0
          hidden: true
      - bar:
          id: timer_bar_paused
          x: 0
          y: 225
          width: 320
          height: 15
          min_value: 0
          max_value: 100
          value: 0
          radius: 0
          bg_color: 0xFFFFFF
          bg_opa: COVER
          indicator:
            bg_color: 0x3b89e3
            radius: 0
          hidden: true
      - label:
          id: timer_label
          x: 80
          y: 40
          width: 160
          height: 50
          text_align: CENTER
          text_color: 0x000000
          text_font: font_timer
          bg_color: 0xFFFFFF
          bg_opa: COVER
          border_width: 1
          border_color: 0x000000
          pad_top: 8
          pad_left: 0
          pad_right: 0
          text: ""
          hidden: true
  pages:
    - id: idle_page
      widgets:
        - image:
            src: casita_idle
            x: 0
            y: 0
    - id: listening_page
      widgets:
        - image:
            src: casita_listening
            x: 0
            y: 0
    - id: thinking_page
      bg_color: 0xFFFFFF
      bg_opa: COVER
      on_load:
        - lvgl.animimg.start: thinking_animimg
      on_unload:
        - lvgl.animimg.stop: thinking_animimg
      widgets:
        - animimg:
            id: thinking_animimg
            src:
              - casita_thinking
              - casita_thinking_1
            duration: 800ms
            repeat_count: forever
            auto_start: false
            x: 0
            y: 0
            width: 320
            height: 240
